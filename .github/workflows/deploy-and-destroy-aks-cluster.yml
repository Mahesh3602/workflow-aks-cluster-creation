name: 'AKS Infrastructure Management'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_VAR_resource_group_name: ${{ vars.AZURE_RG }}
  # Map the choice input to an env var, defaulting to 'apply' on push
  TF_ACTION: ${{ github.event.inputs.action || 'apply' }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.AZURE_RG }}" \
            -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=aks-only.tfstate"

      - name: Terraform Plan
        if: env.TF_ACTION == 'apply'
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: env.TF_ACTION == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: env.TF_ACTION == 'destroy'
        run: terraform destroy -auto-approve