name: 'AKS Infrastructure Management'

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Select the Terraform action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_VAR_resource_group_name: ${{ vars.AZURE_RG }}
  # Captures the user selection from the dropdown
  TF_ACTION: ${{ github.event.inputs.action }}

jobs:
  terraform:
    name: 'Terraform ${{ github.event.inputs.action }}'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.AZURE_RG }}" \
            -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=aks-only.tfstate"

      # This step only runs if 'apply' is selected
      - name: Terraform Apply
        if: env.TF_ACTION == 'apply'
        run: |
          terraform plan -out=tfplan
          terraform apply -auto-approve tfplan

      # This step only runs if 'destroy' is selected
      - name: Terraform Destroy
        if: env.TF_ACTION == 'destroy'
        run: terraform destroy -auto-approve