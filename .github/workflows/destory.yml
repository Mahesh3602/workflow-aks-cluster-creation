name: 'Terraform Destroy'

on:
  workflow_dispatch: # This enables the manual trigger button

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_VAR_resource_group_name: ${{ vars.AZURE_RG }}

jobs:
  terraform-destroy:
    name: 'Destroy AKS'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="resource_group_name=${{ vars.AZURE_RG }}" \
          -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=aks-only.tfstate"

    - name: Terraform Destroy
      run: terraform destroy -auto-approve